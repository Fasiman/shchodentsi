<!DOCTYPE html>
<html>
<head>
  <title>Backend Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    button { padding: 10px; margin: 5px; cursor: pointer; background: #9a00ff; color: white; border: none; border-radius: 5px; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Backend API Test</h1>
  
  <div class="box">
    <h3>1. Get All Users</h3>
    <button onclick="getAllUsers()">Get Users</button>
    <pre id="getAllUsersResult"></pre>
  </div>

  <div class="box">
    <h3>2. Check if Email Exists</h3>
    <input type="email" id="checkEmail" placeholder="Enter email" value="test@example.com">
    <button onclick="checkEmail()">Check Email</button>
    <pre id="checkEmailResult"></pre>
  </div>

  <div class="box">
    <h3>3. Register User</h3>
    <input type="text" id="regName" placeholder="Name" value="Test User">
    <input type="email" id="regEmail" placeholder="Email" value="testuser@example.com">
    <input type="password" id="regPassword" placeholder="Password" value="password123">
    <button onclick="registerUser()">Register</button>
    <pre id="registerResult"></pre>
  </div>

  <script>
    const API_URL = 'http://localhost:1487/user';

    async function getAllUsers() {
      const result = document.getElementById('getAllUsersResult');
      try {
        result.innerHTML = 'Loading...';
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        result.innerHTML = '<span class="success">✓ Success</span>\n' + JSON.stringify(data, null, 2);
      } catch (error) {
        result.innerHTML = '<span class="error">✗ Error: ' + error.message + '</span>';
      }
    }

    async function checkEmail() {
      const email = document.getElementById('checkEmail').value;
      const result = document.getElementById('checkEmailResult');
      try {
        result.innerHTML = 'Loading...';
        const response = await fetch(`${API_URL}?email=${encodeURIComponent(email)}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const exists = Array.isArray(data) ? data.length > 0 : !!data;
        result.innerHTML = '<span class="success">✓ Success</span>\nEmail exists: ' + exists + '\n' + JSON.stringify(data, null, 2);
      } catch (error) {
        result.innerHTML = '<span class="error">✗ Error: ' + error.message + '</span>';
      }
    }

    async function registerUser() {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const result = document.getElementById('registerResult');

      if (!name || !email || !password) {
        result.innerHTML = '<span class="error">✗ Fill all fields</span>';
        return;
      }

      try {
        result.innerHTML = 'Loading...';
        const userData = {
          name,
          email,
          password,
          saved: 0,
          avatar: 'https://i.pravatar.cc/150?img=1'
        };

        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        });

        const data = await response.json();

        if (!response.ok) {
          result.innerHTML = '<span class="error">✗ Error (HTTP ' + response.status + ')</span>\n' + JSON.stringify(data, null, 2);
        } else {
          result.innerHTML = '<span class="success">✓ User created successfully</span>\n' + JSON.stringify(data, null, 2);
        }
      } catch (error) {
        result.innerHTML = '<span class="error">✗ Error: ' + error.message + '</span>';
      }
    }

    // Test on load
    window.onload = () => {
      console.log('Testing backend connection to:', API_URL);
      getAllUsers();
    };
  </script>
</body>
</html>
